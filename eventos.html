<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://script.google.com" />

    <title>Lunaria - Cotiza tu Evento</title>
    <meta
      name="description"
      content="Diseña el menú para tu evento y recibe una cotización personalizada de Lunaria."
    />
    <meta name="theme-color" content="#39646d" />

    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/img/icon-192.png" />
    <link rel="stylesheet" href="assets/css/eventos.css" />

    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>

  <body>
    <div id="eventosApp" class="ev">
      <!-- Progress bar + navigation -->
      <header class="ev-progress ev-hidden" id="evProgress">
        <div class="ev-progress__bar">
          <div class="ev-progress__fill" id="evProgressFill"></div>
        </div>
        <div class="ev-progress__nav">
          <button class="ev-progress__back ev-hidden" id="evBack" aria-label="Volver">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span>Volver</span>
          </button>
          <span class="ev-progress__label" id="evStepLabel"></span>
        </div>
      </header>

      <!-- Dynamic content area -->
      <main id="evContent" class="ev-content"></main>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/eventos.js"></script>
  </body>
</html>
