<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <!-- Preconexiones para recursos críticos -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://script.google.com" />
    
    <title>Lunaria - Menú</title>
    <meta
      name="description"
      content="Menú digital de Lunaria: explora categorías, busca platos e ingredientes y descubre el detalle de cada producto."
    />
    <meta name="theme-color" content="#0b0b0c" />
    
    <link rel="stylesheet" href="assets/css/styles.css?v=1.0.1" />
    
    <!-- Cargar Google Fonts de forma asincrónica -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    </noscript>
  </head>

  <body class="page">
    <div id="homeScreen">
      <header class="hero">
        <div class="hero__media">
          <img
            id="heroImg"
            src="https://res.cloudinary.com/dh2byewas/image/upload/ar_16:9,c_crop,g_north_west,h_1165,w_1537,y_733/c_auto,h_160,w_360/IMG_6007_otxh3l.jpg"
            alt="Fondo del menú"
            loading="lazy"
            decoding="async"
            fetchpriority="low"
            class="hero__img"
          />
        </div>
      </header>

      <!-- BARRA DE ACCIONES -->
      <section id="actionBar" class="action-bar">
        <div id="optionsBar" class="action-bar__inner">
          <div class="action-bar__group action-bar__group--mobile">
            <button id="openSearch" class="action-bar__button" aria-label="Buscar">
              <img src="assets/img/search.svg" class="action-bar__icon" alt="Buscar" />
            </button>
          </div>

          <div class="action-bar__group action-bar__group--mobile">
            <button id="openCatMenu" class="action-bar__button" aria-label="Categorías">
              <img src="assets/img/menu-icon.svg" class="action-bar__icon" alt="Categorias" />
            </button>
          </div>

          <div class="action-bar__current">
            <div id="currentCat" class="action-bar__current-label"></div>
          </div>

          <div class="action-bar__desktop">
            <input
              id="search"
              type="search"
              inputmode="search"
              placeholder="Buscar platos o ingredientes"
              class="action-bar__input"
            />
            <div class="action-bar__desktop-menu">
              <button id="openCatMenuDesk" class="action-bar__menu-trigger">
                Categorias
              </button>
              <div id="catMenuDesk" class="action-bar__menu-list hidden"></div>
            </div>
          </div>
        </div>

        <nav id="catTabs" class="category-tabs no-scrollbar"></nav>

        <div id="searchPanel" class="search-panel hidden">
          <div class="search-panel__inner">
            <div id="inputPanel" class="search-panel__field">
              <span class="search-panel__dot"></span>
              <input
                id="searchUnified"
                type="text"
                inputmode="search"
                placeholder="Buscar platos, ingredientes o categorias"
                class="search-panel__input"
              />
              <button id="clearSearch" class="search-panel__clear" aria-label="Limpiar búsqueda"></button>
            </div>
          </div>
        </div>
      </section>

      <!-- Menu de categorias (overlay movil) -->
      <div id="catMenuOverlay" class="overlay overlay--menu hidden">
        <div class="overlay__backdrop" data-close="overlay"></div>
        <div class="overlay__container">
          <div class="overlay__panel">
            <div id="catMenu" class="overlay__content"></div>
          </div>
        </div>
      </div>

      <!-- CONTENIDO: secciones por categoria -->
      <main id="content" class="menu"></main>
    </div>

    <!-- MODAL DETALLE (pantalla completa) -->
    <div id="detailModal" class="detail-modal hidden">
      <div class="detail-modal__backdrop" data-close="modal"></div>
      <div class="detail-modal__dialog">
        <button id="closeDetail" class="detail-modal__close" aria-label="Cerrar">
          <img src="assets/img/close-icon.svg" class="detail-modal__close-icon" alt="Cerrar" />
        </button>
        <div id="detailSkeleton" class="skeleton-container hidden">
          <div class="skeleton-container__media">
            <div class="skeleton-item skeleton-item--image"></div>
          </div>
          <div class="skeleton-container__body">
            <div class="skeleton-item skeleton-item--title-small"></div>
            <div class="skeleton-item skeleton-item--title-large"></div>
            <div class="skeleton-item skeleton-item--line"></div>
            <div class="skeleton-item skeleton-item--line"></div>
            <div class="skeleton-item skeleton-item--line skeleton-item--line-short"></div>
          </div>
        </div>
        <div class="detail-modal__media">
          <img id="detailImg" src="" alt="" class="detail-modal__img" />
        </div>
        <div class="detail-modal__body">
          <h3 id="detailName" class="detail-modal__title"></h3>
          <p id="detailDesc" class="detail-modal__desc"></p>
          <div class="detail-modal__price">
            Precio: $<span id="detailPrice">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="assets/js/config.js?v=1.0.1"></script>
    <script src="assets/js/appmode.js?v=1.0.1"></script>
    <script src="assets/js/api.js?v=1.0.1"></script>
    <script src="assets/js/store.js?v=1.0.1"></script>
    <script src="assets/js/ui.js?v=1.0.1"></script>
    <script src="assets/js/main.js?v=1.0.1" defer></script>

    <!-- PRELOADER: visible hasta que el servicio responda -->
    <div id="preloader" class="preloader">
      <div class="preloader__box">
        <div class="preloader__spinner" aria-hidden="true"></div>
        <p class="preloader__text" role="status">Cargando menú...</p>
      </div>
    </div>
  </body>
</html>
